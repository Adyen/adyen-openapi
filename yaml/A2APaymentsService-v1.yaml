  /payments/confirm:
    post:
      tags:
      - Payments
      summary: Confirm payment
      description: "    Confirms the payment using Strong Customer Authentication\
        \ (SCA).\n\n    To confirm a payment you must make this request two times:\n\
        \n    1. Make this request to initiate SCA and receive the WWW-Authenticate\
        \ header.\n    2. After the user completes the SCA challenge, make this request\
        \ again, including the updated WWW-Authenticate header.\n\n    The second\
        \ response provides a redirection URL that guides the user to a payment success\
        \ or failure page.\nFor more information, see our [documentation](https://docs.adyen.com/business-accounts/send-funds-ideal-integration)."
      operationId: post-payments-confirm
      parameters:
      - name: WWW-Authenticate
        in: header
        description: 'Header for authenticating through SCA: Contains information
          for an SCA challenge for A2A payments.'
        schema:
          type: string
        example: SCA realm="Transfer" auth-param1="eyJjaGFsbGVuZ2UiOiJiVlV6ZW5wek0waFNl..."
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmPaymentRequest'
            examples:
              Confirm payment request.:
                summary: Confirm payment request.
                description: Specifies the token for the payment to be confirmed,
                  and a balanceAccountid to pay with.
                value:
                  token: TOKEN_PLACEHOLDER
                  balanceAccountId: BA00000000000000000000000
        required: true
      responses:
        '200':
          description: OK - The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmPaymentResponse'
              examples:
                Confirm payment response.:
                  summary: Confirm payment response.
                  description: Specifies the link to where the user should be redirected
                    to. Will contain a `success` link if payment was made succesfully,
                    and a `cancel` if it failed.
                  value:
                    links:
                      success:
                        href: https://successUrl.com
        '400':
          description: Bad Request - The request is malformed or is not the expected
            format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultErrorResponseEntity'
              examples:
                '00_400':
                  summary: 00_400 - Bad request
                  description: Bad request, tunable to map the request body
