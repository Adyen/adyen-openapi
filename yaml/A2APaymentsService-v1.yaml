info:
  title: Account-to-Account (A2A) payments API
  description: "The A2A payments API provides endpoints for A2A payment flows, enabling\
    \ issuers to facilitate direct payments through Adyen for users with an Adyen\
    \ business account.\n\nWith these endpoints, you can:\n- **Retrieve payment details**:\
    \ Retrieve transaction information for specific payments.\n- **Confirm payments**:\
    \ Confirm payments with Strong Customer Authentication (SCA).\n- **Cancel payments**:\
    \ Cancel pending transactions.\n\n## Authentication\nEach request made to the\
    \ A2A Payments API must be signed with an API key. Generate an API key in your\
    \ Customer Area.\n\nTo connect to the API, add an `X-API-Key` header with the\
    \ API key as the value, for example:\n\n ```\ncurl\n-H \"Content-Type: application/json\"\
    \ \\\n-H \"X-API-Key: YOUR_API_KEY\" \\\n...\n```\n\n## Roles and permissions\n\
    To use the A2A Payments API, your API credential must have the following roles:\n\
    - **Role for A2A Issuer payments - API**\n\nReach out to your Adyen contact to\
    \ set up these roles.\n## Going live\nWhen going live, generate an API key in\
    \ your [live Customer Area](https://ca-live.adyen.com/ca). You can then use the\
    \ API key to send requests to `https://balanceplatform-api-live.adyen.com/a2aissuer-api/v{version}/payments`.\n\
    \n"
  termsOfService: https://www.adyen.com/legal/terms-and-conditions
  contact:
    name: Adyen Developer Experience team
    url: https://github.com/Adyen/adyen-openapi
  version: '1'
  x-timestamp: '2026-05-11T15:54:24Z'
