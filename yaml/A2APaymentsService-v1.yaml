components:
  schemas:
    AccountHolder:
      required:
      - fullName
      type: object
      properties:
        fullName:
          minLength: 1
          type: string
          description: Full name of the account holder.
          example: John Doe
    AccountIdentification:
      required:
      - type
      type: object
      properties:
        type:
          type: string
      discriminator:
        propertyName: type
        mapping:
          iban: '#/components/schemas/IbanAccountIdentification'
    Amount:
      required:
      - currency
      - value
      type: object
      properties:
        currency:
          minLength: 1
          type: string
          description: The three-character [ISO 4217 currency code](https://docs.adyen.com/development-resources/currency-codes#currency-codes).
          example: EUR
        value:
          type: integer
          description: The amount of the transaction in [minor units](https://docs.adyen.com/development-resources/currency-codes#minor-units)
            (cents).
          format: int64
          example: 499
    CancelPaymentRequest:
      required:
      - token
      type: object
      properties:
        token:
          maxLength: 1000
          minLength: 1
          type: string
          description: The payment token is an identifier for the payment. It is generated
            by Adyen on the response of the payment details.
          example: ewoJIlNvbWVUb2tlbiIgOiAiU29tZUluZm8iCn0=
    CancelPaymentResponse:
      required:
      - links
      type: object
      properties:
        links:
          description: Contains redirection URLs to guide the user to the appropriate
            page, after a successful payment or a cancellation.
          $ref: '#/components/schemas/Links'
    ConfirmPaymentRequest:
      required:
      - balanceAccountId
      - token
      type: object
      properties:
        balanceAccountId:
          maxLength: 100
          minLength: 1
          type: string
          description: The balance account ID of the account where the funds should
            be subtracted.
          example: BA00000000000000000000000
        token:
          maxLength: 1000
          minLength: 1
          type: string
          description: The payment token is an identifier for the payment. It is generated
            by Adyen on the response of the payment details.
          example: ewoJIlNvbWVUb2tlbiIgOiAiU29tZUluZm8iCn0=
    ConfirmPaymentResponse:
      required:
      - links
      type: object
      properties:
        links:
          description: Contains redirection URLs to guide the user to the appropriate
            page, after a successful payment or a cancellation.
          $ref: '#/components/schemas/Links'
    Counterparty:
      required:
      - accountHolder
      - accountIdentification
      type: object
      properties:
        accountHolder:
          description: Contains the full name of the person or entity that receives
            the payment funds).
          $ref: '#/components/schemas/AccountHolder'
        accountIdentification:
          description: Contains the account number to which the payment funds are
            sent.
          $ref: '#/components/schemas/AccountIdentification'
    DefaultErrorResponseEntity:
      type: object
      properties:
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of
            the problem.
        errorCode:
          type: string
          description: Unique business error code.
        instance:
          type: string
          description: A URI that identifies the specific occurrence of the problem
            if applicable.
        invalidFields:
          type: array
          description: Array of fields with validation errors when applicable.
          items:
            $ref: '#/components/schemas/InvalidField'
        requestId:
          type: string
          description: The unique reference for the request.
        status:
          type: integer
          description: The HTTP status code.
          format: int32
        title:
          type: string
          description: A short, human-readable summary of the problem type.
        type:
          type: string
          description: A URI that identifies the validation error type. It points
            to human-readable documentation for the problem type.
      description: Standardized error response following RFC-7807 format
      externalDocs:
        url: https://www.rfc-editor.org/rfc/rfc7807
    Href:
      required:
      - href
      type: object
      properties:
        href:
          type: string
          description: The full URL for the redirection.
          example: https://someUrl
    IbanAccountIdentification:
      required:
      - iban
      type: object
      allOf:
      - $ref: '#/components/schemas/AccountIdentification'
      - type: object
        properties:
          iban:
            minLength: 1
            type: string
            description: The IBAN of the bank account.
            example: NL00AAAA0000000000
    IdealAuthLinkRequest:
      required:
      - accountHolderId
      type: object
      properties:
        accountHolderId:
          maxLength: 150
          minLength: 1
          type: string
          description: The unique identifier of the account holder.
          example: AH00000000000000000000000
    IdealAuthLinkResponse:
      type: object
      properties:
        redirectUrl:
          description: A short-lived URL that redirects the user to the iDEAL profile
            management page.
          $ref: '#/components/schemas/Href'
          example: https://ideal.auth/someUrl
    IdealAuthenticateRequest:
      required:
      - accountHolderId
      - payload
      type: object
      properties:
        accountHolderId:
          maxLength: 150
          minLength: 1
          type: string
          description: The unique identifier for an account holder.
          example: AH00000000000000000000000
        payload:
          maxLength: 400
          minLength: 1
          type: string
          description: A payload provided by iDEAL to complete the authentication
            process.
          example: https://ideal.auth/somePayload
    IdealAuthenticateResponse:
      type: object
      properties:
        redirectUrl:
          description: A short-lived URL that redirects the user to the iDEAL page
            that is required for authentication.
          $ref: '#/components/schemas/Href'
          example: https://ideal.auth/someUrl
    IdealPaymentDetailsRequest:
      required:
      - method
      - payload
      - source
      type: object
      allOf:
      - $ref: '#/components/schemas/PaymentDetailsRequest'
      - type: object
        properties:
          payload:
            maxLength: 200
            minLength: 1
            type: string
            description: An identifier for the payment, generated by the payment method,
              such as iDEAL. This is obtained from the specified `source`.
            example: https://somePayload
          source:
            description: 'The source used to obtain the payload. Possible values:
              `qr`, `redirect`, and `pushNotification`.'
            $ref: '#/components/schemas/PaymentSource'
            example: redirect
    InvalidField:
      required:
      - message
      - name
      - value
      type: object
      properties:
        message:
          type: string
          description: Description of the validation error.
        name:
          type: string
          description: The field that has an invalid value.
        value:
          type: string
          description: The invalid value.
    Links:
      type: object
      properties:
        cancel:
          description: The URL to where the user must be redirected after a payment
            has been canceled.
          $ref: '#/components/schemas/Href'
          example: https://someUrl
        success:
          description: The URL to where the user must be redirected after a successful
            payment.
          $ref: '#/components/schemas/Href'
          example: https://someUrl
    PaymentDetails:
      required:
      - amount
      - counterparty
      - description
      - expiresAt
      type: object
      properties:
        amount:
          description: The amount of the payment.
          $ref: '#/components/schemas/Amount'
        counterparty:
          description: Contains information about the party that receives the payment
            funds.
          $ref: '#/components/schemas/Counterparty'
        description:
          type: string
          description: The description for the payment. It is generated by the payment
            method, such as iDEAL, and should be shown to the user.
          example: Payment at MyShop. ref:12345678
        expiresAt:
          type: string
          description: 'The expiration date of the payment in ISO DateTime format,
            as described on ISO 20022 (YYYY-MM-DDThh:mm:ss.sss+/-hh:mm).


            Example: **2025-12-30T14:15:30+01:00**'
          format: date-time
          example: '2025-12-30T14:15:30+01:00'
    PaymentDetailsRequest:
      required:
      - method
      type: object
      properties:
        method:
          description: The payment method for the transaction.
          $ref: '#/components/schemas/PaymentMethod'
          example: ideal
      discriminator:
        propertyName: method
        mapping:
          ideal: '#/components/schemas/IdealPaymentDetailsRequest'
    PaymentDetailsResponse:
      required:
      - details
      - token
      type: object
      properties:
        details:
          description: The details of the payment. You must show your user these details
            before they confirm or cancel the payment.
          $ref: '#/components/schemas/PaymentDetails'
        token:
          minLength: 1
          type: string
          description: The token that identifies the payment. It is generated by Adyen
            and is needed to confirm or cancel the payment.
          example: ewoJIlNvbWVUb2tlbiIgOiAiU29tZUluZm8iCn0=
    PaymentMethod:
      type: string
      enum:
      - ideal
    PaymentSource:
      type: string
      enum:
      - redirect
      - qr
      - pushNotification
    ProfileRegistrationRequest:
      required:
      - accountHolderId
      - paymentInstrumentIds
      type: object
      properties:
        accountHolderId:
          maxLength: 150
          minLength: 1
          type: string
          description: The unique identifier of the account holder.
          example: AH00000000000000000000000
        paymentInstrumentIds:
          maxItems: 100
          minItems: 1
          type: array
          description: The unique identifiers of the payment instruments to be associated
            with the iDEAL profile.
          example:
          - PI00000000000000000000000
          - PI11111111111111111111111
          items:
            maxLength: 150
            minLength: 1
            type: string
    ProfileRegistrationResponse:
      type: object
      properties:
        redirectUrl:
          description: A short-lived URL that redirects the user to the iDEAL profile
            registration page.
          $ref: '#/components/schemas/Href'
          example: https://ideal.auth/someUrl
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      name: X-API-Key
      in: header
    BasicAuth:
      type: http
      scheme: basic
jsonSchemaDialect: https://spec.openapis.org/oas/3.1/dialect/base
