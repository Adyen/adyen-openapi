openapi: 3.1.0
info:
  version: '1'
  x-publicVersion: true
  title: Capital webhooks
  description: 'Adyen sends webhooks to notify your system when financing offers or
    grants are created or updated.


    You can use these webhooks to build your implementation. For example, you can
    use webhook data to build a dashboard to show your users details about their business
    financing.'
  termsOfService: https://www.adyen.com/legal/terms-and-conditions
  contact:
    name: Adyen Developer Experience team
    url: https://github.com/Adyen/adyen-openapi
tags:
- name: Dynamic offers
- name: Grant offers
- name: Grants
webhooks:
  balancePlatform.balanceAccountHolder.capitalOffer.created:
    post:
      tags:
      - Grant offers
      summary: Static offer created
      description: Adyen sends this webhook to provide details about a static offer
        that has been created for an account holder.
      x-addedInVersion: '1'
      operationId: post-balancePlatform.balanceAccountHolder.capitalOffer.created
      x-sortIndex: 2
      x-methodName: staticOfferCreated
      security:
      - BasicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrantOffer'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalancePlatformNotificationResponse'
          description: OK - the request has succeeded.
  balancePlatform.capital.dynamicOffer.created:
    post:
      tags:
      - Dynamic offers
      summary: Dynamic offer created
      description: Adyen sends this webhook to provide details about a dynamic offer
        that has been created for an account holder.
      x-addedInVersion: '1'
      operationId: post-balancePlatform.capital.dynamicOffer.created
      x-sortIndex: 1
      x-methodName: dynamicOfferCreated
      security:
      - BasicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DynamicOffer'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalancePlatformNotificationResponse'
          description: OK - the request has succeeded.
  balancePlatform.grants.created:
    post:
      tags:
      - Grants
      summary: Grant created
      description: 'After a grant is created, Adyen sends this webhook with information
        about the grant.


        '
      x-addedInVersion: '1'
      operationId: post-balancePlatform.grants.created
      x-sortIndex: 3
      x-methodName: grantCreated
      security:
      - BasicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Grant'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalancePlatformNotificationResponse'
          description: OK - the request has succeeded.
  balancePlatform.grants.updated:
    post:
      tags:
      - Grants
      summary: Grant updated
      description: 'After a grant is updated, Adyen sends this webhook with information
        about the grant.


        For example, you receive this webhook when the financing amount is disbursed
        to your user, or when your user repays the financing amount.'
      x-addedInVersion: '1'
      operationId: post-balancePlatform.grants.updated
      x-sortIndex: 3
      x-methodName: grantUpdated
      security:
      - BasicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Grant'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalancePlatformNotificationResponse'
          description: OK - the request has succeeded.
components:
  schemas:
    Action:
      additionalProperties: false
      properties:
        actionCode:
          description: The code identifying the action that needs to be completed.
          type: string
        resolved:
          description: Indicates whether this action has been successfully completed.
          type: boolean
      required:
      - actionCode
      - resolved
      type: object
    Amount:
      additionalProperties: false
      properties:
        currency:
          description: The three-character [ISO currency code](https://docs.adyen.com/development-resources/currency-codes#currency-codes)
            of the amount.
          maxLength: 3
          minLength: 3
          type: string
        value:
          description: The numeric value of the amount, in [minor units](https://docs.adyen.com/development-resources/currency-codes#minor-units).
          format: int64
          type: integer
      required:
      - value
      - currency
      type: object
    Balance:
      additionalProperties: false
      properties:
        currency:
          description: The three-character [ISO currency code](https://docs.adyen.com/development-resources/currency-codes).
          type: string
        fee:
          description: The amount of the grant fee.
          format: int64
          type: integer
        principal:
          description: The grant amount that is paid out to the user for business
            financing.
          format: int64
          type: integer
        total:
          description: The total amount of the grant that the user must repay. It
            is the sum of the fee amount and the principal amount.
          format: int64
          type: integer
      required:
      - principal
      - fee
      - total
      - currency
      type: object
    BalancePlatformNotificationResponse:
      additionalProperties: false
      properties:
        notificationResponse:
          description: Respond with any **2xx** HTTP status code to [accept the webhook](https://docs.adyen.com/development-resources/webhooks/#accept-webhooks).
          type: string
      type: object
    DynamicOffer:
      additionalProperties: false
      properties:
        accountHolderId:
          description: The unique identifier of the account holder that the dynamic
            offer is for.
          type: string
        contractType:
          description: 'The contract type of the offer.


            Possible values:

            * **loan**

            * **cashAdvance**'
          enum:
          - cashAdvance
          - loan
          type: string
        expiresAt:
          description: The expiration date and time of the offer validity period.
          format: date-time
          type: string
        financingType:
          description: 'The type of financing that the offer is for.


            Possible values: **businessFinancing**.'
          enum:
          - businessFinancing
          - hardwareFinancing
          type: string
        id:
          description: The unique identifier of the dynamic offer.
          type: string
        maximumAmount:
          description: The maximum financing amount available to the account holder
            under this offer.
          $ref: '#/components/schemas/Amount'
        minimumAmount:
          description: The minimum financing amount available to the account holder
            under this offer.
          $ref: '#/components/schemas/Amount'
        repayment:
          description: Contains information about the repayment configuration of the
            grant.
          $ref: '#/components/schemas/DynamicOfferRepayment'
        startsAt:
          description: The starting date and time of the offer validity period.
          format: date-time
          type: string
      required:
      - id
      - accountHolderId
      - startsAt
      - expiresAt
      - financingType
      - maximumAmount
      - minimumAmount
      - repayment
      - contractType
      type: object
    DynamicOfferRepayment:
      additionalProperties: false
      properties:
        term:
          description: Contains information about the time period in which your user
            must repay the total amount of the grant.
          $ref: '#/components/schemas/RepaymentTerm'
      required:
      - term
      type: object
    Grant:
      additionalProperties: false
      properties:
        balances:
          description: Contains information about the balances of the grant.
          $ref: '#/components/schemas/Balance'
        counterparty:
          description: Contains the details of the party that receives the grant.
          $ref: '#/components/schemas/GrantCounterparty'
        grantAccountId:
          description: The unique identifier of the grant account that tracks this
            grant.
          type: string
        grantOfferId:
          description: The unique identifier of the selected offer. Adyen uses the
            details of the selected offer to create a grant.
          type: string
        id:
          description: The unique identifier of the grant reference.
          type: string
        status:
          description: Contains the status of the grant.
          $ref: '#/components/schemas/Status'
      required:
      - grantAccountId
      - grantOfferId
      - id
      - status
      - balances
      type: object
    GrantCounterparty:
      additionalProperties: false
      properties:
        accountHolderId:
          description: The unique identifier of the account holder that receives the
            grant.
          type: string
        balanceAccountId:
          description: The unique identifier of the balance account where the funds
            are disbursed. The balance account must belong to the specified account
            holder.
          type: string
        transferInstrumentId:
          description: The unique identifier of the transfer instrument where the
            funds are disbursed. The transfer instrument must belong to the legal
            entity of the specified account holder.
          type: string
      type: object
    GrantInfoCounterparty:
      additionalProperties: false
      properties:
        balanceAccountId:
          description: The unique identifier of the balance account where the funds
            are disbursed. The balance account must belong to the specified account
            holder.
          type: string
        transferInstrumentId:
          description: The unique identifier of the transfer instrument where the
            funds are disbursed. The transfer instrument must belong to the legal
            entity of the specified account holder.
          type: string
      type: object
    GrantOffer:
      additionalProperties: false
      properties:
        accountHolderId:
          description: The unique identifier of the account holder to which the grant
            is offered.
          type: string
        amount:
          description: The amount that would be paid out to the user for business
            financing.
          $ref: '#/components/schemas/Amount'
        contractType:
          description: 'The contract type of the offer.


            Possible values:

            * **loan**

            * **cashAdvance**'
          enum:
          - cashAdvance
          - loan
          type: string
        expiresAt:
          description: The expiration date and time of the offer validity period.
          format: date-time
          type: string
        fee:
          description: Contains information about the fee that your user would pay
            for the grant.
          $ref: '#/components/schemas/GrantOfferFee'
        id:
          description: The unique identifier of the offer.
          type: string
        repayment:
          description: Contains information about the repayment configuration of the
            grant.
          $ref: '#/components/schemas/Repayment'
        startsAt:
          description: The starting date and time of the offer validity period.
          format: date-time
          type: string
      required:
      - accountHolderId
      type: object
    GrantOfferFee:
      additionalProperties: false
      properties:
        amount:
          description: Contains the amount of the offer fee.
          $ref: '#/components/schemas/Amount'
        aprBasisPoints:
          description: Annual Percentage Rate (APR) of the offer. The percentage is
            expressed in [basis points](https://www.investopedia.com/terms/b/basispoint.asp).
          format: int32
          type: integer
      required:
      - amount
      type: object
    Repayment:
      additionalProperties: false
      properties:
        basisPoints:
          description: The percentage of your user's incoming net volume that is deducted
            for repaying the grant. The percentage expressed in [basis points](https://www.investopedia.com/terms/b/basispoint.asp).
          format: int32
          type: integer
        term:
          description: Contains information about the time period in which your user
            must repay the total amount of the grant.
          $ref: '#/components/schemas/RepaymentTerm'
        threshold:
          description: Contains the minimum threshold amount that your user must repay
            every 30-day period.
          $ref: '#/components/schemas/ThresholdRepayment'
      required:
      - basisPoints
      type: object
    RepaymentTerm:
      additionalProperties: false
      properties:
        estimatedDays:
          description: The estimated duration of the repayment term, in days.
          format: int32
          type: integer
        maximumDays:
          description: The maximum duration of the repayment term, in days. Only applies
            when `contractType` is **loan**.
          format: int32
          type: integer
      required:
      - estimatedDays
      type: object
    Status:
      additionalProperties: false
      properties:
        actions:
          description: 'A list of actions that need to be completed to proceed with
            the grant. '
          items:
            $ref: '#/components/schemas/Action'
          type: array
        code:
          description: 'The code for the status of the grant. Possible values:

            - **Pending**

            - **Active**

            - **Repaid**

            - **WrittenOff**

            - **Failed**

            - **Revoked**

            - **Requested**

            - **Reviewing**

            - **Approved**

            - **Rejected**

            - **Cancelled**'
          enum:
          - Pending
          - Active
          - Repaid
          - WrittenOff
          - Failed
          - Revoked
          - Requested
          - Reviewing
          - Approved
          - Rejected
          - Cancelled
          type: string
      required:
      - code
      type: object
    ThresholdRepayment:
      additionalProperties: false
      properties:
        amount:
          description: The minimum threshold amount that your user must repay on every
            30-day period.
          $ref: '#/components/schemas/Amount'
      required:
      - amount
      type: object
  securitySchemes:
    BasicAuth:
      scheme: basic
      type: http
  examples: {}
